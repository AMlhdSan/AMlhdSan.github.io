<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网课分享站</title>
    <style>
        body {
            background-image: url('背景图片的URL');
            background-size: cover;
            font-family: '宋体', sans-serif;
        }
        h1 {
            text-align: center;
            font-weight: bold;
            font-size: 2em;
            margin-top: 20%;
        }
        .download-btn {
            display: block;
            width: 200px;
            height: 50px;
            margin: 0 auto;
            background-color: white;
            color: blue;
            font-weight: bold;
            font-size: 1.5em;
            line-height: 50px;
            text-align: center;
            text-decoration: none;
            border: 2px solid blue;
            border-radius: 10px;
        }
        .left-link {
            position: absolute;
            top: 10px;
            left: 10px;
            font-weight: bold;
            color: black;
            text-decoration: none;
        }
        .right-arrow {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            font-size: 3em;
            color: black;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="https://amlhdsan.github.io/" class="left-link">缪语博的主页</a>
    <h1>网课分享站</h1>
    <a href="自定义链接的URL" class="download-btn">下载Download</a>
    <a href="另一个链接的URL" class="right-arrow">→</a>
</body>
</html>
